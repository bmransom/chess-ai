[tool.ruff]
target-version = "py311"
# The vitepress site and the local virtualenv are not ours to lint.
extend-exclude = ["docs", ".venv"]

[tool.pytest.ini_options]
# importlib import mode keeps src/tests modules from colliding with src/ modules.
addopts = "--import-mode=importlib"
testpaths = ["src/tests", "tests"]
python_files = ["test_*.py", "core_seam.py", "movegen_diff.py", "no_python_chess.py"]
